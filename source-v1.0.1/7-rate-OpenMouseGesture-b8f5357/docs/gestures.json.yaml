# 概要: gestures.jsonの書式定義（YAML Schema Document）
# このファイルはgestures.jsonの構造を示すドキュメントであり、実際のスキーマファイルではありません。
# 各フィールドの型、必須/任意、デフォルト値、説明を記載しています。

# ルート: ジェスチャーテンプレート配列
type: array
items:
  type: object
  required:
    - name
    - points
  properties:
    # ジェスチャー名
    name:
      type: string
      description: |
        ジェスチャーの識別名
        config.jsonのactionからこの名前で参照される
      example: "左"

    # ジェスチャーの座標点列
    points:
      type: array
      description: |
        正規化されたジェスチャーの座標点の配列
      minItems: 1
      items:
        type: array
        description: [x, y]座標のペア
        minItems: 2
        maxItems: 2
        items:
          type: number
          format: float
        example: [100.0, 150.0]

# 使用例
example:
  - name: "左"
    points:
      - [200.0, 100.0]
      - [196.83, 100.0]
      - [193.65, 100.0]
      - [190.48, 100.0]
      # ... (リサンプリング後、通常63点)
      - [0.0, 100.0]
  
  - name: "右"
    points:
      - [0.0, 100.0]
      - [3.17, 100.0]
      - [6.35, 100.0]
      # ... (リサンプリング後、通常63点)
      - [200.0, 100.0]
  
  - name: "上"
    points:
      - [100.0, 200.0]
      - [100.0, 196.83]
      # ... (リサンプリング後、通常63点)
      - [100.0, 0.0]
  
  - name: "下"
    points:
      - [100.0, 0.0]
      - [100.0, 3.17]
      # ... (リサンプリング後、通常63点)
      - [100.0, 200.0]
  
  - name: "下→右"
    points:
      - [100.0, 0.0]
      - [100.0, 5.0]
      # ... L字型の軌跡
      - [200.0, 100.0]

# 注意事項
notes: |
  - 正規化により、スケール、回転、位置に不変なジェスチャー認識が可能
  - 新しいジェスチャーを追加する場合は、実際に描画してから正規化された座標を取得すること
  - ユーザーが描いた生の軌跡ではなく、必ず正規化後の座標を登録すること
